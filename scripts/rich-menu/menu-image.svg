<!--
  Rich Menu 圖片模板（2500×843，4 個按鈕橫排）
  使用方法：
    1. 用任何線上工具把這個 SVG 轉成 PNG（搜尋「svg to png 2500x843」）
       例如：https://www.svgconverter.com/svg-png
    2. 把 PNG 存成 menu-image.png 放這個資料夾
    3. 跑 node scripts/rich-menu/setup.mjs
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="843" viewBox="0 0 2500 843">
  <!-- 漸層背景 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
  </defs>
  <rect width="2500" height="843" fill="url(#bg)"/>

  <!-- 分隔線 -->
  <line x1="625" y1="120" x2="625" y2="723" stroke="#2a3450" stroke-width="2"/>
  <line x1="1250" y1="120" x2="1250" y2="723" stroke="#2a3450" stroke-width="2"/>
  <line x1="1875" y1="120" x2="1875" y2="723" stroke="#2a3450" stroke-width="2"/>

  <!-- 第 1 格：查航班 -->
  <text x="312.5" y="380" font-family="Arial, sans-serif" font-size="180" fill="#60a5fa" text-anchor="middle">🔍</text>
  <text x="312.5" y="540" font-family="'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle">查航班</text>

  <!-- 第 2 格：我的訂閱 -->
  <text x="937.5" y="380" font-family="Arial, sans-serif" font-size="180" fill="#22c55e" text-anchor="middle">📋</text>
  <text x="937.5" y="540" font-family="'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle">我的訂閱</text>

  <!-- 第 3 格：設定 -->
  <text x="1562.5" y="380" font-family="Arial, sans-serif" font-size="180" fill="#a78bfa" text-anchor="middle">⚙️</text>
  <text x="1562.5" y="540" font-family="'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle">設定</text>

  <!-- 第 4 格：說明 -->
  <text x="2187.5" y="380" font-family="Arial, sans-serif" font-size="180" fill="#fb923c" text-anchor="middle">ℹ️</text>
  <text x="2187.5" y="540" font-family="'PingFang TC', 'Microsoft YaHei', sans-serif" font-size="76" font-weight="bold" fill="#ffffff" text-anchor="middle">說明</text>
</svg>
